        <script>
                document.getElementById('loginForm').addEventListener('submit', async (e) => {
                    e.preventDefault(); // Prevents the default HTML form submission
                    const username = document.getElementById('username').value;
                    const password = document.getElementById('password').value;
                    const errorElement = document.getElementById('errorMessage');            
                    try {                
                        // Send credentials to the backend server
                        const response = await fetch('/api/login', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ username, password })                
                        });
                        const data = await response.json();                        
                        if (response.ok) {
                            // Success! Send user to the dashboard
                            window.location.href = 'Portal/student/dashboard.html';
                        } else {
                            // Show error message from the server
                            errorElement.textContent = data.message;
                        }
                    } catch (err) {
                        errorElement.textContent = "Cannot connect to the server.";
                    }        
                });    
        </script>
