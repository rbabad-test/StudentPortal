<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Log-in | Saint Gregory College</title>
    <meta name="description" content="Authenticate if you are a student of SGCST" />
    <link rel="icon" href="/favicon.ico?favicon.0x3dzn~oxb6tn.ico" sizes="256x256" type="image/x-icon" />
    
    <link rel="stylesheet" href="style.css" data-precedence="next" />
    <link rel="stylesheet" href="style1.css" data-precedence="next" />
</head>
<body class="antialiased">

    <div class="min-h-screen w-full flex justify-center items-center p-5 transition-all duration-500 bg-[linear-gradient(135deg,#f80c0c_0%,#b9da02_100%)]">
        
        <div class="relative w-full max-w-[450px] bg-white/95 backdrop-blur-[10px] rounded-[30px] shadow-[0_15px_35px_rgba(0,0,0,0.2)] p-10 text-center">
            
            <a class="absolute top-5 left-5 flex items-center justify-center w-10 h-10 rounded-full hover:bg-gray-200/50 transition-all z-50 text-gray-600" aria-label="Back to home" href="/Home">
                <span class="text-2xl font-bold">&larr;</span>
            </a>

            <div class="mb-6">
                <img alt="logo" loading="lazy" width="100" height="100" class="block mx-auto rounded-full mb-4" src="/_next/image?url=%2Flogo1.jpg&amp;w=256&amp;q=75" />
                <h1 class="text-[#333] text-3xl font-bold mb-1">Saint Gregory</h1>
                <p class="text-[#666] text-base">College of Science and Technology</p>
            </div>

            <div class="flex justify-center items-center mb-6 bg-gray-100 p-1 rounded-2xl w-fit mx-auto">
                <button type="button" class="px-6 py-2 rounded-xl text-sm font-bold transition-all bg-white text-[#6a11cb] shadow-sm">Student</button>
                <button type="button" class="px-6 py-2 rounded-xl text-sm font-bold transition-all text-gray-500">Faculty</button>
            </div>

            <form class="text-left" id="loginForm">
                <div class="mb-5">
                    <label class="block mb-2 text-[#444] font-semibold text-sm" for="username" id="username">Student Number</label>
                    <input class="w-full p-3.5 border-2 border-gray-200 rounded-xl text-base transition-all focus:border-[#2575fc] focus:outline-none focus:ring-4 focus:ring-[#2575fc]/10" type="text" id="username" placeholder="Enter your Student Number" required name="username" />
                </div>

                <div class="mb-5">
                    <label class="block mb-2 text-[#444] font-semibold text-sm" for="password" id="password">Password</label>
                    <input class="w-full p-3.5 border-2 border-gray-200 rounded-xl text-base transition-all focus:border-[#2575fc] focus:outline-none focus:ring-4 focus:ring-[#2575fc]/10" type="password" id="password" placeholder="Enter your password" required name="password" />
                </div>

                <div class="flex items-center mb-4 cursor-pointer">
                    <input type="checkbox" id="showPassword" class="w-4 h-4 mr-2 cursor-pointer accent-[#2575fc]" />
                    <label for="showPassword" class="text-[#444] text-sm cursor-pointer select-none">Show Password</label>
                </div>

                <div class="flex items-center mb-6">
                    <input type="checkbox" id="privacyPolicy" class="w-4 h-4 mr-2 cursor-pointer accent-[#2575fc]" required />
                    <label for="privacyPolicy" class="text-[#444] text-sm cursor-pointer leading-tight select-none">
                        I agree to the <a class="text-[#2575fc] hover:underline" href="#">Data Privacy Policy</a>
                    </label>
                </div>

                <button type="submit" class="w-full p-4 text-white font-bold text-lg rounded-xl shadow-lg transition-all hover:-translate-y-0.5 active:translate-y-0 bg-[linear-gradient(to_right,#6a11cb,#2575fc)] shadow-blue-500/30">
                    Student Login
                </button>
                <p id="errorMessage" style="color: red;"></p>
            </form>
            <script>
                document.getElementById('loginForm').addEventListener('submit', async (e) => {
                    e.preventDefault(); // Prevents the default HTML form submission
                    const username = document.getElementById('username').value;
                    const password = document.getElementById('password').value;
                    const errorElement = document.getElementById('errorMessage');            
                    try {                
                        // Send credentials to the backend server
                        const response = await fetch('/api/login', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ username, password })                
                        });
                        const data = await response.json();                        
                        if (response.ok) {
                            // Success! Send user to the dashboard
                            window.location.href = 'Portal/student/dashboard.html';
                        } else {
                            // Show error message from the server
                            errorElement.textContent = data.message;
                        }
                    } catch (err) {
                        errorElement.textContent = "Cannot connect to the server.";
                    }        
                });    
            </script>

            <a class="inline-block mt-6 text-[#2575fc] text-sm hover:underline" href="/Portal/forgot-password">Forgot Password?</a>
            
        </div>
    </div>

</body>
</html>
