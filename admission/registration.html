    <div class="min-h-screen bg-slate-50 p-6 md:p-12 font-sans text-[#1E293B]">
      <div class="max-w-4xl mx-auto">
        
        <div class="mb-10 flex justify-between items-end">
          <div>
            <h1 class="text-4xl font-black text-[#451a03]">SGCST Admission</h1>
            <p class="text-slate-500 font-medium italic">Saint Gregory College of Science and Technology</p>
            <a href="/admission/verification" class="text-slate-400 font-medium italic hover:text-slate-800 transition-colors">already submitted an application?</a>
          </div>

        </div>

        <div class="bg-white rounded-3xl p-8 md:p-12 shadow-xl space-y-10">
          
          <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <div class="flex flex-col gap-2">
              <label class="text-[10px] font-black uppercase text-slate-400 ml-1">First Name *</label>
              <input type="text" placeholder="Juan" class="w-full p-4 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:border-yellow-400 text-sm" />
            </div>
            <div class="flex flex-col gap-2">
              <label class="text-[10px] font-black uppercase text-slate-400 ml-1">Middle Name</label>
              <input type="text" placeholder="Protacio" class="w-full p-4 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:border-yellow-400 text-sm" />
            </div>
            <div class="flex flex-col gap-2">
              <label class="text-[10px] font-black uppercase text-slate-400 ml-1">Last Name *</label>
              <input type="text" placeholder="Dela Cruz" class="w-full p-4 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:border-yellow-400 text-sm" />
            </div>
            <div class="flex flex-col gap-2">
              <label class="text-[10px] font-black uppercase text-slate-400 ml-1">Email Address *</label>
              <input type="email" placeholder="juan@example.com" class="w-full p-4 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:border-yellow-400 text-sm" />
            </div>
            <div class="flex flex-col gap-2">
              <label class="text-[10px] font-black uppercase text-slate-400 ml-1">Phone Number *</label>
              <input type="text" placeholder="+63 9xx xxx xxxx" class="w-full p-4 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:border-yellow-400 text-sm" />
            </div>
            <div class="flex flex-col gap-2">
              <label class="text-[10px] font-black uppercase text-slate-400 ml-1">Date of Birth *</label>
              <input type="date" class="w-full p-4 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:border-yellow-400 text-sm" />
            </div>
            <div class="flex flex-col gap-2">
              <label class="text-[10px] font-black uppercase text-slate-400 ml-1">Gender *</label>
              <select class="w-full p-4 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:border-yellow-400 text-sm">
                <option value="Male">Male</option>
                <option value="Female">Female</option>
                <option value="Other">Other</option>
              </select>
            </div>
            <div class="flex flex-col gap-2">
              <label class="text-[10px] font-black uppercase text-slate-400 ml-1">Nationality *</label>
              <input type="text" placeholder="Filipino" class="w-full p-4 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:border-yellow-400 text-sm" />
            </div>
          </div>

          <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div class="flex flex-col gap-2">
              <label class="text-[10px] font-black uppercase text-slate-400 ml-1">Desired Track/Strand *</label>

                <option value="Information and Communication Technology">Information and Communication Technology</option>
                <option value="Hotel and Restaurant Management">Hotel and Restaurant Management</option>
              </select>
            </div>
            <div class="flex flex-col gap-2">
              <label class="text-[10px] font-black uppercase text-slate-400 ml-1">Enrollment Type *</label>
              <select class="w-full p-4 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:border-yellow-400 text-sm">
                <option value="New Student">New Student</option>
                <option value="Transferee">Transferee</option>
              </select>
            </div>
            <div class="flex flex-col gap-2">
              <label class="text-[10px] font-black uppercase text-slate-400 ml-1">Grade Level *</label>
              <select class="w-full p-4 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:border-yellow-400 text-sm">
                <option value="Grade 11">Grade 11</option>
                <option value="Grade 12">Grade 12</option>
              </select>
            </div>
            <div class="flex flex-col gap-2">
              <label class="text-[10px] font-black uppercase text-slate-400 ml-1">LRN</label>
              <input type="text" placeholder="12-digit LRN" class="w-full p-4 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:border-yellow-400 text-sm" />
            </div>
            <div class="flex flex-col gap-2">
              <label class="text-[10px] font-black uppercase text-slate-400 ml-1">Last School Attended *</label>
              <input type="text" placeholder="School Name" class="w-full p-4 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:border-yellow-400 text-sm" />
            </div>
          </div>

          <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div class="flex flex-col gap-2">
              <label class="text-[10px] font-black uppercase text-slate-400 ml-1">Street Address *</label>
              <input type="text" placeholder="Unit/House No, Street" class="w-full p-4 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:border-yellow-400 text-sm" />
            </div>
            <div class="flex flex-col gap-2">
              <label class="text-[10px] font-black uppercase text-slate-400 ml-1">City / Municipality *</label>
              <input type="text" placeholder="Manila" class="w-full p-4 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:border-yellow-400 text-sm" />
            </div>
            <div class="flex flex-col gap-2">
              <label class="text-[10px] font-black uppercase text-slate-400 ml-1">State / Province *</label>
              <input type="text" placeholder="Metro Manila" class="w-full p-4 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:border-yellow-400 text-sm" />
            </div>
            <div class="flex flex-col gap-2">
              <label class="text-[10px] font-black uppercase text-slate-400 ml-1">Zip / Postal Code *</label>
              <input type="text" placeholder="1000" class="w-full p-4 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:border-yellow-400 text-sm" />
            </div>
            <div class="flex flex-col gap-2">
              <label class="text-[10px] font-black uppercase text-slate-400 ml-1">Country *</label>
              <input type="text" placeholder="Philippines" class="w-full p-4 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:border-yellow-400 text-sm" />
            </div>
          </div>

          <div class="space-y-6">
            <div class="flex flex-col gap-2">
              <label class="text-[10px] font-black uppercase text-slate-400 ml-1">Personal Statement *</label>

            </div>
            <div class="p-8 border-2 border-dashed border-slate-200 rounded-2xl bg-slate-50 text-center">
              <p class="text-sm font-bold text-slate-600">Upload Required Documents *</p>
              <p class="text-xs text-slate-400 mb-4">Report Card &amp; Birth Certificate</p>
              <button class="px-6 py-2 bg-white border border-slate-300 rounded-lg text-xs font-black uppercase">Browse Files</button>
            </div>
            <label class="flex items-center gap-3">
              <input type="checkbox" class="w-5 h-5 accent-yellow-500" />
              <span class="text-xs text-slate-500">I certify that all information provided is true and correct.</span>
            </label>
          </div>

          <button class="w-full py-5 bg-[#451a03] text-white rounded-2xl font-black uppercase tracking-widest">Submit Application</button>
          
        </div>
      </div>
